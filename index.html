<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Atleta Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* === TODO TU CSS ORIGINAL (NO MODIFICADO) === */
:root {
  --bg: #0a0b0e;
  --bg2: #111318;
  --bg3: #181c24;
  --bg4: #1e2330;
  --accent: #e8ff47;
  --accent2: #47c8ff;
  --red: #ff4757;
  --green: #2ed573;
  --orange: #ffa502;
  --text: #f0f2f7;
  --muted: #6b7280;
  --border: rgba(255,255,255,0.07);
  --card: #13161f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
</style>
</head>

<body>

<!-- HEADER ORIGINAL -->
<div class="header">
  <div class="header-top">
    <div class="logo">Modo Atleta Pro</div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="hero-title">HOY<br><span id="dayName">LUNES</span></div>
</div>

<!-- TRACKING -->
<div id="tracking" class="section active">

  <div class="check-group-label">
    Suplementos (Natación Mar–Jue 7:00 AM)
  </div>

  <!-- COLAGENO -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Colágeno (10–15g)</span>
    <span class="check-tag">6:00 AM (solo si hay entrenamiento o rehab)</span>
  </label>

  <!-- CURCUMA + VIT C -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Cúrcuma + Vitamina C</span>
    <span class="check-tag">6:00 AM</span>
  </label>

  <!-- CITRULINA -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Citrulina + Arginina</span>
    <span class="check-tag">6:30 AM (solo días de entrenamiento)</span>
  </label>

  <!-- CREATINA -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Creatina (5g)</span>
    <span class="check-tag">Post entreno o cualquier hora</span>
  </label>

  <!-- OMEGA 3 -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Omega 3</span>
    <span class="check-tag">Desayuno</span>
  </label>

  <!-- HIALOFLEX -->
  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Hialoflex</span>
    <span class="check-tag">Desayuno</span>
  </label>

  <!-- ENTRENAMIENTO -->
  <div class="check-group-label" style="margin-top:1.25rem;">
    Entrenamiento
  </div>

  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Sesión de entrenamiento</span>
    <span class="check-tag">Natación / Gym / Bike</span>
  </label>

  <label class="check-item" onclick="toggleCheck(this)">
    <input type="checkbox" class="habit-check">
    <div class="custom-check"></div>
    <span class="check-label">Rehab hombro</span>
    <span class="check-tag">Diario</span>
  </label>

</div>

<script>
/* === TU JS ORIGINAL (NO MODIFICADO) === */

function toggleCheck(el) {
  const checkbox = el.querySelector('input');
  checkbox.checked = !checkbox.checked;
  el.classList.toggle('done', checkbox.checked);
}
</script>

</body>
</html>
